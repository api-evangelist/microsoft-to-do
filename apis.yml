aid: microsoft-to-do
url: https://raw.githubusercontent.com/api-evangelist/microsoft-to-do/refs/heads/main/apis.yml
apis:
  - aid: microsoft-to-do:graph-tasks-api
    name: Microsoft Graph To Do Tasks API
    tags:
      - Tasks
      - To Do
      - Productivity
      - Microsoft Graph
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0/
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/todo-overview
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/todo-overview
        type: Documentation
      - url: https://learn.microsoft.com/en-us/graph/api/resources/todotask
        type: API Reference
    description: >-
      The Microsoft Graph To Do Tasks API provides access to Microsoft To Do
      task lists and tasks. Developers can create, read, update, and delete
      task lists and individual tasks, manage task completion status, set
      due dates and reminders, add file attachments, and organize tasks
      with linked resources across Microsoft 365.
